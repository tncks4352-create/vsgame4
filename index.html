<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Space Bullet Survival</title>
  <link rel="stylesheet" href="./style.css?v=8" />
</head>
<body>
  <main class="game-wrapper">
    <h1>SPACE BULLET SURVIVAL</h1>

    <section class="hud">
      <div>난이도 <strong id="levelText">1</strong></div>
      <div>피한 총알 <strong id="scoreText">0</strong>개</div>
      <div>다음 난이도 <strong id="nextLevelText">10</strong>개</div>
    </section>

    <div class="canvas-frame">
      <canvas id="gameCanvas" width="800" height="520"></canvas>
      <div id="levelUpText" class="level-up hidden">LEVEL UP</div>
      <div id="startText" class="start-text hidden">OK, LET'S GO!</div>

      <section id="introScreen" class="overlay-panel">
        <h2>SPACE BULLET SURVIVAL</h2>
        <p class="subtitle">SURVIVE THE INCOMING FIRE</p>
        <button id="introStartBtn">게임 시작</button>
      </section>

      <section id="guideScreen" class="overlay-panel hidden">
        <h2>MISSION</h2>
        <div class="guide-content">
          <p><strong>목표</strong> 날아오는 탄막을 최대한 많이 피하세요.</p>
          <p><strong>조작</strong> WASD 또는 방향키로 이동합니다.</p>
          <p><strong>규칙</strong> 총알 10개 회피마다 난이도가 상승합니다.</p>
          <p><strong>주의</strong> 난이도 상승 시 행성 탄막 1개가 등장합니다.</p>
        </div>
        <button id="playStartBtn">I'M READY</button>
      </section>
    </div>

    <section class="controls">
      <p>조작: WASD 또는 방향키</p>
      <button id="startBtn">게임 시작</button>
      <button id="restartBtn">다시 시작</button>
      <button id="soundBtn">사운드 ON</button>
    </section>

    <div id="message">게임 시작 버튼을 누르세요</div>

    <section id="nameInputBox" class="name-box hidden">
      <input type="text" id="nicknameInput" placeholder="닉네임 입력" maxlength="10" />
      <button id="saveRankBtn">기록 저장</button>
    </section>

    <section class="ranking-box">
      <h2>RANKING TOP 10</h2>
      <ol id="rankingList"></ol>
      <button id="clearRankBtn">기록 초기화</button>
    </section>
  </main>

  <script src="./script.js?v=8"></script>
</body>
</html>
